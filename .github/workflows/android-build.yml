name: Android Build

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect Android changes
    runs-on: ubuntu-latest

    outputs:
      android: ${{ steps.filter.outputs.changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed files
        id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EVENT_ACTION="${{ github.event.action }}"
          BEFORE_SHA="${{ github.event.before }}"
          PR_BASE_SHA="${{ github.event.pull_request.base.sha }}"
          PR_HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          if [[ "$EVENT_ACTION" == "synchronize" && -n "$BEFORE_SHA" ]]; then
            CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$PR_HEAD_SHA")"
          else
            CHANGED_FILES="$(git diff --name-only "$PR_BASE_SHA...$PR_HEAD_SHA")"
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          ANDROID_REGEX='^(android/|src/|app/|assets/|package\.json$|bun\.lock$|app\.json$|app\.config\.(js|ts)$|eas\.json$|babel\.config\.js$|metro\.config\.js$|tsconfig\.json$|expo-env\.d\.ts$|index\.(js|ts|tsx)$|App\.(js|ts|tsx)$|\.github/workflows/android-build\.yml$)'

          if echo "$CHANGED_FILES" | grep -qE "$ANDROID_REGEX"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 25

    if: needs.changes.outputs.android == 'true'

    env:
      CI: true
      NODE_ENV: development
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -v \
            -storetype JKS \
            -keystore android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: habbittracker-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error