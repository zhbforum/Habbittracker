name: Android Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v1.0.0"
        required: true
        type: string
      prerelease:
        description: "Mark this GitHub Release as a prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-android:
    name: Build and publish Android release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      NODE_ENV: production
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      HABBITTRACKER_UPLOAD_STORE_FILE: ${{ github.workspace }}/android/app/habbittracker-upload.keystore
      HABBITTRACKER_UPLOAD_STORE_PASSWORD: ${{ secrets.HABBITTRACKER_UPLOAD_STORE_PASSWORD }}
      HABBITTRACKER_UPLOAD_KEY_ALIAS: ${{ secrets.HABBITTRACKER_UPLOAD_KEY_ALIAS }}
      HABBITTRACKER_UPLOAD_KEY_PASSWORD: ${{ secrets.HABBITTRACKER_UPLOAD_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Restore release keystore
        env:
          HABBITTRACKER_UPLOAD_KEYSTORE_BASE64: ${{ secrets.HABBITTRACKER_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$HABBITTRACKER_UPLOAD_KEYSTORE_BASE64" | base64 --decode > android/app/habbittracker-upload.keystore
          chmod 600 android/app/habbittracker-upload.keystore

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Prepare release artifact
        run: |
          mkdir -p release-artifacts
          cp android/app/build/outputs/apk/release/app-release.apk release-artifacts/habbittracker-${{ inputs.version }}.apk

      - name: Upload release artifact to workflow
        uses: actions/upload-artifact@v4
        with:
          name: habbittracker-release-apk
          path: release-artifacts/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version }}
          name: Habbittracker ${{ inputs.version }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: release-artifacts/*.apk