name: Android Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 1.0.0"
        required: true
        type: string
      prerelease:
        description: "Mark this GitHub Release as a prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-android:
    name: Build and publish Android release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      NODE_ENV: production
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -v \
            -storetype JKS \
            -keystore android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Prepare release artifact
        run: |
          mkdir -p release-artifacts
          cp android/app/build/outputs/apk/release/app-release.apk release-artifacts/habbittracker-${{ inputs.version }}.apk

      - name: Upload release artifact to workflow
        uses: actions/upload-artifact@v4
        with:
          name: habbittracker-release-apk
          path: release-artifacts/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version }}
          name: Habbittracker ${{ inputs.version }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: release-artifacts/*.apk