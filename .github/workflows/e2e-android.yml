name: Android E2E

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: android-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  maestro-smoke:
    name: Maestro Android smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      CI: true
      NODE_ENV: development
      MAESTRO_CLI_NO_ANALYTICS: true
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -v \
            -storetype JKS \
            -keystore android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            adb wait-for-device
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk

            echo "Prepare emulator:"
            adb shell input keyevent 82 || true
            adb shell settings put global window_animation_scale 0 || true
            adb shell settings put global transition_animation_scale 0 || true
            adb shell settings put global animator_duration_scale 0 || true

            echo "Installed packages:"
            adb shell pm list packages | grep -i habbit || true
            adb shell pm list packages | grep -i anonymous || true

            echo "Resolve launcher activity:"
            adb shell cmd package resolve-activity --brief com.anonymous.Habbittracker || true

            echo "Package info:"
            adb shell dumpsys package com.anonymous.Habbittracker | grep -i -E "Activity|MAIN|LAUNCHER|version|codePath" || true

            echo "Warm up app launch:"
            adb shell monkey -p com.anonymous.Habbittracker -c android.intent.category.LAUNCHER 1 || true
            sleep 10

            echo "Recent app logs after warm-up launch:"
            adb logcat -d -t 400 | grep -i -E "Habbittracker|anonymous|ReactNative|AndroidRuntime|FATAL|Exception|Unable|Supabase|Expo" || true

            mkdir -p test-reports/e2e
            maestro --version

            echo "Run Maestro smoke test with retry:"
            bash -lc 'for attempt in 1 2 3; do echo "Maestro attempt $attempt/3"; adb shell am force-stop com.anonymous.Habbittracker || true; maestro test .maestro --format junit --output test-reports/e2e/report.xml && exit 0; echo "Attempt $attempt failed"; adb logcat -d -t 200 | grep -i -E "Habbittracker|anonymous|ReactNative|AndroidRuntime|FATAL|Exception|Unable|Supabase|Expo" || true; sleep 5; done; exit 1'

      - name: Upload E2E report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-e2e-report
          path: test-reports/e2e/
          if-no-files-found: warn